services:

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
      - WEBUI_PORT=8080
    volumes:
      - /home/orion/downloads:/downloads
      - /home/orion/docker/qbittorrent:/config
    ports:
      - 8080:8080
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - /home/orion/media/movies:/movies
      - /home/orion/downloads:/downloads
      - /home/orion/docker/radarr:/config
    ports:
      - 7878:7878
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - /home/orion/media/shows:/tv
      - /home/orion/downloads:/downloads
      - /home/orion/docker/sonarr:/config
    ports:
      - 8989:8989
    restart: unless-stopped
